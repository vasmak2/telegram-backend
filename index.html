<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Stars Auction</title>
    <!-- Подключаем SDK Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --tg-theme-bg-color: #fff;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #fff;
            --tg-theme-text-color: #000;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 20px; text-align: center;
        }
        .nft-card {
            border-radius: 15px; background: rgba(0,0,0,0.05); padding: 15px; margin-bottom: 20px;
        }
        .nft-image { width: 100%; border-radius: 10px; max-width: 250px; }
        .bid-info { font-size: 24px; font-weight: bold; margin: 15px 0; }
        .bid-button {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none; border-radius: 10px; padding: 15px 30px;
            font-size: 18px; cursor: pointer; width: 100%;
        }
        .bid-button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="nft-card">
        <img src="https://via.placeholder.com" alt="NFT Gift" class="nft-image">
        <h2>Telegram Gift #123</h2>
        <div class="bid-info">Текущая ставка: <span id="current-bid">100</span> ⭐️</div>
    </div>

    <input type="number" id="bid-amount" placeholder="Ваша ставка" style="width: 80%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
    <button id="main-button" class="bid-button">Сделать ставку</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        const bidInput = document.getElementById('bid-amount');
        const bidButton = document.getElementById('main-button');
        const API_URL = "https://telegram-backend-94bo.onrender.com"; // Замените на URL вашего FastAPI

        bidButton.addEventListener('click', async () => {
            const amount = parseInt(bidInput.value);
            const currentBid = parseInt(document.getElementById('current-bid').innerText);

            if (amount <= currentBid) {
                tg.showAlert("Ставка должна быть выше текущей!");
                return;
            }

            bidButton.disabled = true;

            try {
                // 1. Запрос к вашему API за ссылкой на оплату
                const response = await fetch(`${API_URL}/create-bid-invoice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: tg.initDataUnsafe.user?.id,
                        amount: amount
                    })
                });

                const data = await response.json();

                // 2. Открытие нативного окна оплаты Telegram
                tg.openInvoice(data.invoice_link, (status) => {
                    bidButton.disabled = false;
                    if (status === 'paid') {
                        tg.showAlert("Ставка принята! Ожидайте обновления.");
                    } else if (status === 'cancelled') {
                        tg.showPopup({ message: "Оплата отменена" });
                    }
                });
            } catch (error) {
                tg.showAlert("Ошибка связи с сервером");
                bidButton.disabled = false;
            }
        });
    </script>
</body>
</html>
