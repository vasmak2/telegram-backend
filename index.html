<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Stars Auction</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --tg-theme-bg-color: #17212b;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #0e1621;
            --tg-theme-hint-color: #215171;
            --tg-theme-background-color: #3e6480;
            --tg-theme-input-color: #6aa1c5;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 20px; text-align: center;
        }
        .nft-card {
            border-radius: 20px; background: rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .nft-image { width: 100%; border-radius: 15px; max-width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .bid-info { font-size: 26px; font-weight: 800; margin: 20px 0; color: #2481cc; }
        .hint { font-size: 14px; color: var(--tg-theme-hint-color); margin-bottom: 10px; }

    input {
        width: 90%;
        padding: 14px;
        margin-bottom: 20px;
        border-radius: 12px;
        /* Используем цвета темы Telegram */
        background-color: var(--tg-theme-input-color, #3e6480);
        color: var(--tg-theme-text-color, #000000);

        /* Убираем стандартную рамку и добавляем свою тонкую */
        border: 1px solid rgba(0, 0, 0, 0.1);
        font-size: 18px;
        font-weight: 600;
        text-align: center;
        outline: none;
        transition: border-color 0.3s ease;
    }

/* Эффект при нажатии (фокусе) */
input:focus {
    border-color: var(--tg-theme-button-color, #2481cc);
}

/* Цвет текста-подсказки (placeholder) */
input::placeholder {
    color: var(--tg-theme-input-color, #7cb3dd);
    font-weight: 400;
}

        .bid-button {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none; border-radius: 12px; padding: 16px;
            font-size: 18px; font-weight: bold; cursor: pointer; width: 100%;
            transition: opacity 0.2s;
        }
        .bid-button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="nft-card">
        <img src="https://via.placeholder.com" alt="NFT Gift" class="nft-image">
        <h2 id="item-name">Telegram Gift #123</h2>
        <div class="hint">Минимальный шаг — любая сумма выше текущей</div>
        <div class="bid-info"><span id="current-bid">...</span> ⭐️</div>
    </div>

    <input type="number" id="bid-amount" placeholder="Сумма доплаты (звёзды)" inputmode="numeric">
    <button id="main-button" class="bid-button">Повысить ставку</button>

    <script>
        const tg = window.Telegram.WebApp;
        const bidInput = document.getElementById('bid-amount');
        const bidButton = document.getElementById('main-button');
        const bidDisplay = document.getElementById('current-bid');

        // URL твоего бэкенда на Render
        const API_URL = "https://telegram-backend-94bo.onrender.com";

        tg.expand();
        tg.ready();

        // 1. Функция получения актуальной ставки из БД при входе
        async function fetchCurrentStatus() {
            try {
                const response = await fetch(`${API_URL}/`);
                const data = await response.json();
                bidDisplay.innerText = data.current_bid;
            } catch (e) {
                console.error("Ошибка загрузки данных:", e);
                bidDisplay.innerText = "Ошибка";
            }
        }

        // Запускаем обновление при старте
        fetchCurrentStatus();

        // 2. Обработка клика по кнопке
        bidButton.addEventListener('click', async () => {
            const amount = parseInt(bidInput.value);

            if (!amount || amount <= 0) {
                tg.showAlert("Введите корректное число звёзд");
                return;
            }

            bidButton.disabled = true;
            bidButton.innerText = "Подготовка счета...";

            try {
                const response = await fetch(`${API_URL}/create-bid-invoice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: tg.initDataUnsafe.user?.id || 0,
                        amount: amount
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "Ошибка сервера");
                }

                const data = await response.json();

                // 3. Открываем нативную оплату Telegram
                tg.openInvoice(data.invoice_link, (status) => {
                    bidButton.disabled = false;
                    bidButton.innerText = "Повысить ставку";

                    if (status === 'paid') {
                        tg.showAlert("Оплата прошла! Ваша ставка обновится в течение пары секунд.");
                        fetchCurrentStatus(); // Обновляем цифру на экране
                        bidInput.value = "";
                    }
                });
            } catch (error) {
                tg.showAlert("Ошибка: " + error.message);
                bidButton.disabled = false;
                bidButton.innerText = "Повысить ставку";
            }
        });
    </script>
</body>
</html>
